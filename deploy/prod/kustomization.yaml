apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
images:
  - name: ghcr.io/ma-shaaban/todo
    # Pinned by scripts/release.sh (release: vX.Y.Z commit + tag). Prod ships
    # ONLY tagged releases — Flux tracks semver tags, not main.
    newTag: 0.2.2
patches:
  - patch: |-
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: todo
      spec:
        hostnames:
          - todo.nezam.site
