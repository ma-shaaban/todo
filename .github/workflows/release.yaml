# Release to Production (ticket 038). Trigger from GitHub → Actions → release
# → "Run workflow" (works from the mobile app/browser), or:
#   gh workflow run release -f bump=patch
# Portal: the app's catalog entry links here ("Release to Production").
#
# What one run does — the workflow_dispatch IS the release button:
#   1. Computes the next semver from existing tags (or takes an explicit one).
#   2. Builds + pushes the prod image ghcr.io/<owner>/<app>:X.Y.Z ITSELF.
#      (A tag pushed with GITHUB_TOKEN does NOT trigger ci.yaml — GitHub's
#      anti-recursion — so relying on the tag-push build would silently never
#      build. Building here also removes release.sh's documented
#      ImagePullBackOff race: the image exists BEFORE Flux sees the tag.)
#   3. Pins deploy/prod/kustomization.yaml to X.Y.Z, commits "release: vX.Y.Z",
#      tags vX.Y.Z, pushes both (same mechanics as scripts/release.sh).
#   4. Creates the GitHub Release with generated notes.
# Flux's <app>-release GitRepository tracks the highest semver tag → app-prod
# deploys → https://<app>.nezam.site. Rollback = run again from a good commit
# (higher version), exactly like release.sh.
name: release
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        type: choice
        options: [patch, minor, major]
        default: patch
      version:
        description: Explicit version X.Y.Z (overrides bump)
        required: false

permissions:
  contents: write # release commit + tag + GitHub Release
  packages: write # prod image to GHCR

# One release at a time — and the pin step below rebases before tagging, so a
# concurrent CI deploy-PR merge on main (hit live on the first run: the branch
# push was rejected non-fast-forward while the tag went through) cannot reject
# the push.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # all tags — needed to compute the next version

      - name: Compute version
        id: ver
        run: |
          set -eu
          EXPLICIT="${{ inputs.version }}"
          if [ -n "$EXPLICIT" ]; then
            echo "$EXPLICIT" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' || { echo "'$EXPLICIT' is not semver X.Y.Z"; exit 1; }
            VERSION="$EXPLICIT"
          else
            LATEST=$(git tag -l 'v[0-9]*' | sed 's/^v//' | sort -V | tail -1)
            LATEST="${LATEST:-0.0.0}"
            MA=${LATEST%%.*}; REST=${LATEST#*.}; MI=${REST%%.*}; PA=${REST##*.}
            case "${{ inputs.bump }}" in
              major) VERSION="$((MA+1)).0.0" ;;
              minor) VERSION="${MA}.$((MI+1)).0" ;;
              *)     VERSION="${MA}.${MI}.$((PA+1))" ;;
            esac
          fi
          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "tag v$VERSION already exists"; exit 1
          fi
          echo "version=$VERSION" >>"$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.ver.outputs.image }}:${{ steps.ver.outputs.version }}
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}

      - name: Pin prod, commit, tag, push
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -eu
          tmp="$(mktemp)"
          sed "s/newTag: .*/newTag: ${VERSION}/" deploy/prod/kustomization.yaml >"$tmp"
          mv "$tmp" deploy/prod/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/prod/kustomization.yaml
          git commit -m "release: v${VERSION}"
          # main may have advanced while the image built (CI deploy-PR merges,
          # ADR-028): rebase the pin commit onto latest main BEFORE tagging,
          # retry a few times, and only tag what actually lands.
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD; then break; fi
            [ "$attempt" = 3 ] && { echo "push kept failing after rebase"; exit 1; }
            sleep 5
          done
          git tag -m "release v${VERSION}" "v${VERSION}"
          git push origin "refs/tags/v${VERSION}"

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: gh release create "v${VERSION}" --generate-notes --title "v${VERSION}"
